<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashana Journeys – Terms & Conditions</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05070d;
    color:#d7d7d7;
    font-family:'Inter',sans-serif;
    line-height:1.9;
    padding:40px 20px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:100% 40px, 40px 100%;
    pointer-events:none;
}

.wrapper{
    max-width:900px;
    margin:auto;
}

/* BACK BUTTON */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:#d4af37;
    border:1px solid rgba(212,175,55,0.35);
    padding:10px 18px;
    border-radius:14px;
    margin-bottom:28px;
    font-size:14px;
    transition:0.3s ease;
    background:rgba(255,255,255,0.02);
}

.back-btn:hover{
    background:rgba(212,175,55,0.08);
    border-color:#d4af37;
}

.label{
    color:#4cc9f0;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:18px;
}

.title{
    font-family:'Cormorant Garamond',serif;
    font-size:64px;
    line-height:0.9;
    font-weight:700;
    color:#ffffff;
    margin-bottom:40px;
}

.title span{
    color:#d4af37;
}

.card{
    background:rgba(8,10,18,0.88);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:40px;
    backdrop-filter: blur(10px);
}

.section{
    margin-bottom:42px;
    padding-bottom:24px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.section:last-child{
    border-bottom:none;
}

h2{
    font-family:'Cormorant Garamond',serif;
    color:#ffffff;
    font-size:32px;
    margin-bottom:16px;
}

p{
    font-size:15px;
    color:#b8b8b8;
    margin-bottom:12px;
}

ul{
    list-style:none;
}

li{
    position:relative;
    padding-left:20px;
    margin-bottom:10px;
}

li::before{
    content:"✦";
    position:absolute;
    left:0;
    color:#d4af37;
    font-size:11px;
    top:4px;
}
</style>
</head>
<body>

<div class="wrapper">

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="label">LEGAL INFORMATION</div>

    <div class="title">
        Terms <span>&</span><br>
        Conditions
    </div>

    <div class="card">
        <!-- all 13 sections here -->
    </div>

</div>

</body>
</html>
